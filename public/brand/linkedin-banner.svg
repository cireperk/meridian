<svg width="1128" height="191" viewBox="0 0 1128 191" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Warm white base -->
  <rect width="1128" height="191" fill="#FEFEFE"/>
  <!-- Soft flowing gradient wash — left to right, emerald to teal to warm -->
  <ellipse cx="200" cy="95" rx="400" ry="160" fill="url(#wash1)" opacity="0.12"/>
  <ellipse cx="900" cy="95" rx="450" ry="180" fill="url(#wash2)" opacity="0.08"/>
  <ellipse cx="564" cy="180" rx="600" ry="80" fill="url(#wash3)" opacity="0.06"/>
  <!-- Gentle organic curves suggesting flow/movement -->
  <path d="M-50 140 Q200 60, 450 100 Q700 140, 950 70 Q1050 50, 1180 90" stroke="url(#line1)" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.15"/>
  <path d="M-50 160 Q250 90, 500 120 Q750 150, 1000 80 Q1080 65, 1180 100" stroke="url(#line1)" stroke-width="1" stroke-linecap="round" fill="none" opacity="0.1"/>
  <path d="M-50 120 Q150 80, 400 95 Q650 110, 900 60 Q1020 40, 1180 75" stroke="url(#line2)" stroke-width="0.8" stroke-linecap="round" fill="none" opacity="0.08"/>
  <defs>
    <linearGradient id="wash1" x1="0" y1="0" x2="400" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    <linearGradient id="wash2" x1="600" y1="0" x2="1128" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="wash3" x1="0" y1="0" x2="1128" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d9488"/>
      <stop offset="40%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="line1" x1="0" y1="0" x2="1128" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d9488"/>
      <stop offset="50%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="line2" x1="0" y1="0" x2="1128" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
